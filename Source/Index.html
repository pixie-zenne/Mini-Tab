<!DOCTYPE html>

<html lang="en">

	<head>
		<title>Tri Box</title>

		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="stylesheet" href="Style.css">
	</head>

	<body>
		<div class="box_container">
			<div class="box_grid">

				<div class="box" id="top_left">
					<h1>Tri Box</h1>
				</div> <!--top_left-->

				<div class="box" id="top_right">
					<a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
					<a href="https://stackoverflow.com/questions" target="_blank" rel="noopener">Stack Overflow</a>
				</div> <!--top_right-->

				<div class="box" id="bottom">
					<p>A simple single static page<br></p>
				</div> <!--bottom-->

			</div> <!--grid-->
		</div> <!--center-->
	</body>

</html>
